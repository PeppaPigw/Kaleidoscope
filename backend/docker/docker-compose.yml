# Kaleidoscope Docker Compose — All Infrastructure Services
# Usage: docker compose up -d

name: kaleidoscope

services:
  # --- PostgreSQL 16 with pgvector ---
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: kaleidoscope
      POSTGRES_USER: kaleidoscope
      POSTGRES_PASSWORD: kaleidoscope
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kaleidoscope"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # --- Meilisearch ---
  meilisearch:
    image: getmeili/meilisearch:v1.6
    environment:
      MEILI_MASTER_KEY: kaleidoscope-meili-key
      MEILI_ENV: development
    ports:
      - "7700:7700"
    volumes:
      - meili_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Qdrant ---
  qdrant:
    image: qdrant/qdrant:v1.7.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- Neo4j 5 Community ---
  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/kaleidoscope
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "neo4j status || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- MinIO (S3-compatible Object Storage) ---
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: kaleidoscope
      MINIO_ROOT_PASSWORD: kaleidoscope
    ports:
      - "9000:9000" # API
      - "9001:9001" # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 15s
      timeout: 10s
      retries: 5

  # --- GROBID (PDF Parser) ---
  grobid:
    image: grobid/grobid:0.8.0
    ports:
      - "8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --- Celery Worker ---
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A app.worker.celery_app worker --loglevel=info --concurrency=4 -Q celery,ingestion,parsing,indexing,embedding,ragflow
    environment:
      - DATABASE_URL=postgresql://kaleidoscope:kaleidoscope@postgres:5432/kaleidoscope
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../app:/app/app
      - ../data:/app/data
    restart: unless-stopped

  # --- Celery Beat (Scheduler) ---
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    command: celery -A app.worker.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://kaleidoscope:kaleidoscope@postgres:5432/kaleidoscope
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../app:/app/app
    restart: unless-stopped

volumes:
  postgres_data:
    name: kaleidoscope_postgres_data
  redis_data:
    name: kaleidoscope_redis_data
  meili_data:
    name: kaleidoscope_meili_data
  qdrant_data:
    name: kaleidoscope_qdrant_data
  neo4j_data:
    name: kaleidoscope_neo4j_data
  minio_data:
    name: kaleidoscope_minio_data
